name: Smart Money Flow Tracker

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1-5"   # 7:30 PM IST (14:00 UTC), weekdays

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN_SMF }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEETS_CRED:      ${{ secrets.GOOGLE_DRIVE_CRED }}
          GOOGLE_SHEETS_ID:      ${{ secrets.GOOGLE_SHEET_ID_SMF }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python -m modules.smart_money